<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBPenter Vulnerability Report</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background-color: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #00d2ff; text-align: center; border-bottom: 2px solid #00d2ff; padding-bottom: 10px; }
        .summary { display: flex; justify-content: space-between; background-color: #3d3d3d; padding: 15px; border-radius: 5px; margin-bottom: 30px; }
        .summary div { font-size: 1.1em; }
        .highlight { color: #ff5252; font-weight: bold; }
        .finding { background-color: #383838; border-left: 5px solid #ff5252; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .finding.High { border-color: #ff5252; }
        .finding.Critical { border-color: #ff0000; background-color: #4a1f1f; }
        .finding h3 { margin-top: 0; color: #ff5252; }
        .payload { background-color: #1e1e1e; padding: 10px; border-radius: 4px; font-family: monospace; color: #a5d6a7; overflow-x: auto; }
        .footer { text-align: center; margin-top: 40px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Telegram Bot Security Report</h1>
        <div class="summary">
            <div><strong>Target Bot:</strong> <span style="color:#00d2ff;">{TARGET}</span></div>
            <div><strong>Scan Time:</strong> {TIME}</div>
            <div><strong>Total Findings:</strong> <span class="highlight">{TOTAL}</span></div>
        </div>
        
        <h2>Detailed Findings</h2>
        {FINDINGS_HTML}
        
        <div class="footer">
            Generated by TBPenter Framework (AI Enhanced)
        </div>
    </div>
</body>
</html>
